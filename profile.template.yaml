# scorerole candidate profile template
# ─────────────────────────────────────────────────────────────────────────────
# Copy to ~/.job_pipeline/profile.yaml and fill in, OR run:
#   scorerole init   (structured wizard)
#   scorerole init2  (conversational, beta)
#
# Mental model:
#   candidate.*   — who you are  (from resume + LinkedIn)
#   target.*      — what titles you're after
#   aspirations.* — how you want to work and grow
#   preferences.* — soft signals (affect ranking, not hard filters)
#   deal_breakers — hard no's (hard filter)
#   salary_floor_usd — hard comp floor (hard filter)
#   inferred.*    — derived by scorerole init, rarely edited manually
#   notes         — free-text calibration injected into scoring prompt
# ─────────────────────────────────────────────────────────────────────────────

candidate:
  name: "Your Name"
  email: "you@example.com"
  location: "City, State"
  location_preference: "remote"     # remote / flexible / local
  open_to_relocation: []            # list cities/regions, or leave empty

  experience:
    - company: "Most Recent Company"
      title: "Your Title"
      dates: "Jan 2022 – Present"
      highlights:
        - "Key accomplishment or responsibility"
        - "Another highlight with specific impact"
    - company: "Previous Company"
      title: "Your Title"
      dates: "2018 – 2022"
      highlights:
        - "Key accomplishment"

  education:
    - institution: "University Name"
      degree: "BS Computer Science"
      year: 2018

  strengths:
    - "0-1 product builds — launched X, resulting in Y"
    - "Cross-functional leadership at [scale/scope]"

target:
  roles:                            # aspirational titles (be ambitious, not just historical)
    - "Staff PM"
    - "Principal PM"
    - "Director of Product"
  level: "staff"                    # ic / senior / staff / director / vp / c-suite

aspirations:
  track: "flexible"                 # ic / management / flexible
  direction: |
    Two or three sentences: where you want to go and why — forward-looking,
    not a resume summary. E.g. "Moving from Senior PM toward a Staff IC role
    at an AI-native company where I can own 0-1 product strategy."
  company_types:
    - "AI-native startup with applied science team"
    - "Enterprise SaaS with clear AI roadmap"
  avoid_company_types:              # soft avoids — hard no's go in deal_breakers
    - "pure consulting / services"

preferences:                        # soft signals — affect ranking, not hard filters
  company_stage:                    # seed / series-a / growth / public
    - "growth"
    - "public"
  company_size: null                # "startup (<200)" / "mid-size (200-2000)" / "enterprise (2000+)"
  company_environment: null         # e.g. "startup", "enterprise", "mission-driven"
  industry_targets:
    - "AI/ML Platform"
    - "Developer Tools"
  industry_avoid: []
  base_salary_target_usd: null      # aspirational target (vs salary_floor_usd which is the hard floor)

deal_breakers:                      # absolute no's — hard filter, will not apply
  - "no equity"
  - "on-site 5 days/week"

salary_floor_usd: 150000            # hard comp floor; set to null if not applicable

inferred:                           # set by scorerole init from resume; rarely edited manually
  customer_types:                   # b2b / b2c / b2b2c / marketplace / developer / internal
    - "b2b"
  degree_level: "bs"                # none / bs / ms_phd

notes: |
  Free-text calibration notes. Appended to the scoring system prompt verbatim.
  Use for: level rules, domain caveats, anything Claude should weigh specially.
  Also updated by: scorerole feedback
